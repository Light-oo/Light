<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Autenticación</title>
    <link rel="stylesheet" href="/app/search.css" />
  </head>
  <body>
    <main class="app">
      <header class="header">
        <div class="title">Iniciar sesión</div>
      </header>
      <section class="card">
        <div class="field">
          <label class="label" for="email">Email</label>
          <input id="email" type="email" autocomplete="email" placeholder="correo@ejemplo.com" />
        </div>
        <div class="field">
          <label class="label" for="password">Contraseña</label>
          <input id="password" type="password" autocomplete="current-password" placeholder="••••••••" />
        </div>
        <div class="helper" id="authError" hidden>No se pudo iniciar sesión. Verifica tus datos.</div>
        <button class="btn btn-primary btn-block" id="continue">Continuar</button>
        <button class="btn btn-block" id="createAccount" type="button">Crear cuenta</button>
      </section>
    </main>
    <script type="module" src="/app/auth.js"></script>
  </body>
</html>

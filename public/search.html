<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Buscar repuestos</title>
    <link rel="stylesheet" href="/app/search.css" />
  </head>
  <body>
    <main class="app">
      <header class="header">
        <div>
          <div class="title">Buscar repuestos</div>
          <div class="market" id="querySummary"></div>
        </div>
        <div class="header-actions">
          <button class="btn" id="modeToggle">BUY</button>
          <button class="btn" id="openRefine">Refinar</button>
        </div>
      </header>

      <main id="searchStateRoot" aria-live="polite"></main>
    </main>

    <div class="overlay" id="refineOverlay" aria-hidden="true">
      <div class="sheet">
        <div class="title">Refinar búsqueda</div>
        <div class="field">
          <label class="label required-when-sell" for="brand">Marca</label>
          <select id="brand">
            <option value="">Todas</option>
          </select>
        </div>
        <div class="field">
          <label class="label required-when-sell" for="model">Modelo</label>
          <select id="model">
            <option value="">Todos</option>
          </select>
        </div>
        <div class="field">
          <label class="label required-when-sell" for="year">Año exacto</label>
          <select id="year">
            <option value="">Cualquiera</option>
          </select>
        </div>
        <div class="field">
          <label class="label required-when-sell" for="itemTypeId">Tipo de pieza</label>
          <select id="itemTypeId">
            <option value="">Todas</option>
          </select>
        </div>
        <div class="field">
          <label class="label" for="side">Lado (opcional)</label>
          <select id="side">
            <option value="">Cualquiera</option>
          </select>
        </div>
        <div class="field">
          <label class="label" for="position">Posición (opcional)</label>
          <select id="position">
            <option value="">Cualquiera</option>
          </select>
        </div>
        <div class="field" id="buyDetailsField">
          <label class="label" for="buyDetail">Detalles adicionales</label>
          <input id="buyDetail" type="text" placeholder="Detalles que ayuden a encontrar la pieza" />
        </div>
        <div id="sellFields" hidden>
          <div class="field">
            <label class="label" for="sellItemDetail">Pieza <span class="required">*</span></label>
            <input id="sellItemDetail" type="text" placeholder="Ej: Bumper delantero" required />
          </div>
          <div class="field-row">
            <div class="field field-half">
              <label class="label" for="sellPrice">Precio <span class="required">*</span></label>
              <input id="sellPrice" type="number" min="10" max="1000" step="1" required />
            </div>
            <div class="field checkbox-field">
              <label class="label">
                <input id="sellHidePrice" type="checkbox" />
                Ocultar precio
              </label>
            </div>
          </div>
        </div>
        <div class="actions">
          <button class="btn btn-block" id="resetRefine">Reset</button>
          <button class="btn btn-block" id="closeRefine">Cerrar</button>
          <button class="btn btn-primary btn-block" id="applyRefine">
            Aplicar
          </button>
        </div>
      </div>
    </div>

    <div class="toast" id="toast" role="status"></div>

    <script type="module" src="/app/search.js"></script>
  </body>
</html>

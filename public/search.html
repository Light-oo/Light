<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Buscar repuestos</title>
    <link rel="stylesheet" href="/app/search.css" />
  </head>
  <body>
    <main class="app">
      <header class="header">
        <div>
          <div class="title">Buscar repuestos</div>
          <div class="market" id="querySummary"></div>
        </div>
        <div class="header-actions">
          <button class="btn" id="modeToggle">BUY</button>
          <button class="btn btn-primary" id="sellPublish">Publicar</button>
          <button class="btn" id="sellSearch">Buscar</button>
          <button class="btn" id="openRefine">Buscar</button>
        </div>
      </header>

      <main id="searchStateRoot" aria-live="polite"></main>
    </main>

    <div class="overlay" id="refineOverlay" aria-hidden="true">
      <div class="sheet">
        <div class="title" id="refineTitle">Buscar</div>
        <div class="field">
          <label class="label required-always" for="brand">Marca</label>
          <select id="brand">
            <option value="">Todas</option>
          </select>
        </div>
        <div class="field">
          <label class="label required-always" for="model">Modelo</label>
          <select id="model">
            <option value="">Todos</option>
          </select>
        </div>
        <div class="field">
          <label class="label required-always" for="year">Año</label>
          <select id="year">
            <option value="">Cualquiera</option>
          </select>
        </div>
        <div class="field">
          <label class="label required-always" for="itemTypeId">Tipo de pieza</label>
          <select id="itemTypeId">
            <option value="">Todas</option>
          </select>
        </div>
        <div class="field">
          <label class="label" for="side">Lado (opcional)</label>
          <select id="side">
            <option value="">Cualquiera</option>
          </select>
        </div>
        <div class="field">
          <label class="label" for="position">Posición (opcional)</label>
          <select id="position">
            <option value="">Cualquiera</option>
          </select>
        </div>
        <div class="field">
          <label class="label required-always" for="itemDetail">Pieza</label>
          <input id="itemDetail" type="text" placeholder="Ej: Bumper delantero" required />
        </div>
        <div class="field-row">
          <div class="field field-half">
            <label class="label required-always" id="priceLabel" for="priceInput">Precio</label>
            <input id="priceInput" type="number" min="10" max="1000" step="1" required />
          </div>
        </div>
        <div class="actions">
          <button class="btn btn-block" id="resetRefine">Reset</button>
          <button class="btn btn-block" id="closeRefine">Cerrar</button>
          <button class="btn btn-primary btn-block" id="applyRefine">Buscar</button>
        </div>
      </div>
    </div>

    <div class="toast" id="toast" role="status"></div>

    <script type="module" src="/app/search.js"></script>
  </body>
</html>
